  <title>Mapa</title>
</head>
<body>

    <div id="map" style="height: 500px;"></div>
    

<script>
  var map = L.map('map').fitWorld();                            <!--Inicia mostrando el mapa entero-->

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);
</script>

<script>
  map.locate({setView: true, maxZoom: 16});                       <!-- zoom a ubicacion de usuario -->
</script>

<script>
  function onLocationFound(e) {                                             <!--Muestra ubicacion del usuario y distancia del punto marcado-->
    var radius = e.accuracy;

    L.marker(e.latlng).addTo(map)
        .bindPopup("Estas a menos de " + radius + " metros de este punto.").openPopup();

    L.circle(e.latlng, radius).addTo(map);
}

map.on('locationfound', onLocationFound);
</script>

<script>
  function onLocationError(e) {                                       <!--Muestra error si no se consigue la ubicacion-->
    alert(e.message);
}

map.on('locationerror', onLocationError);
</script>

<script>
  var map = L.map('map').setView([-34.6037, -58.3816], 13);   
</script>

<script>
  var greenIcon = L.icon({                                            <!-- Creo el marcador personalizado -->
    iconUrl: 'img/leaf-green.png',
    shadowUrl: 'img/leaf-shadow.png',

    iconSize:     [38, 95], // size of the icon
    shadowSize:   [50, 64], // size of the shadow
    iconAnchor:   [22, 94], // point of the icon which will correspond to marker's location
    shadowAnchor: [4, 62],  // the same for the shadow
    popupAnchor:  [-3, -76] // point from which the popup should open relative to the iconAnchor
});
</script>

<script>
  L.marker([-34.595628, -58.395081], {icon: greenIcon}).addTo(map);                       <!-- Coloco marcador personalizado -->
</script>

<script>
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'

<script>

</script>

<script>
var popup = L.popup();

function onMapClick(e) {            <!-- Muestra coordenadas donde se clickea -->
    popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);
</script>

<script>
  var circle = L.circle([-34.603965, -58.411732], {       <!-- Genera un circulo -->
    color: 'red',
    fillColor: '#f03',
    fillOpacity: 0.5,
    radius: 500
}).addTo(map);
</script>
