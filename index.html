<script>
var popup = L.popup();

function onMapClick(e) {            <!-- Muestra coordenadas donde se clickea -->

        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);
</script>
