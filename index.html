  <!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>


  <title>Mapa</title>
</head>
<body>

    <div id="map" style="height: 500px;"></div>
    

    <script>
  var map = L.map('map').setView([-34.6037, -58.3816], 13);   
</script>



<script>
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
</script>

<script>
  var marker = L.marker([-34.6037, -58.3816]).addTo(map);  <!-- Marcador 1 -->
</script>
<script>
  var marker = L.marker([-34.6037, -58.3816]).addTo(map);
  marker.bindPopup("Hola! Soy un popup 😄");
</script>

<script>
  var marker2 = L.marker([100.6037, 0.3816]).addTo(map);  <!-- Marcador 2 -->
</script>
<script>
  var marker2 = L.marker([100.6037, 0.3816]).addTo(map);
  marker2.bindPopup("Hola! Es el borde del mapa 😨");
</script>

<script>
  var marker3 = L.marker([46.6037, 22.3816]).addTo(map);  <!-- Marcador 3 -->
</script>
<script>
  var marker3 = L.marker([46.6037, 22.3816]).addTo(map);
  marker3.bindPopup("Alguna parte de algun lugar 😦");
</script>

<script>
var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);
</script>


</body>
</html>
